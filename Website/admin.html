<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zestok Admin Panel</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', Arial, sans-serif; background: #0b1a2e; color: #e8f2fa; padding: 24px; }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { font-size: 24px; margin-bottom: 24px; color: #64b5f6; }
    .tab-bar { display: flex; gap: 8px; margin-bottom: 24px; }
    .tab-bar button { padding: 10px 20px; border: 1px solid #1a3a5a; background: #0c1f3a; color: #94a3b8; border-radius: 8px; cursor: pointer; }
    .tab-bar button.active { background: #1e88e5; color: #fff; border-color: #1e88e5; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .card { background: #0c1f3a; border: 1px solid #1a3a5a; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .card h3 { color: #64b5f6; margin-bottom: 12px; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #1a3a5a; font-size: 13px; }
    th { color: #94a3b8; font-weight: 600; }
    .badge { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
    .badge.pending { background: #f59e0b20; color: #f59e0b; border: 1px solid #f59e0b; }
    .badge.confirmed { background: #22c55e20; color: #22c55e; border: 1px solid #22c55e; }
    .badge.active { background: #22c55e20; color: #22c55e; border: 1px solid #22c55e; }
    .badge.inactive { background: #ef444420; color: #ef4444; border: 1px solid #ef4444; }
    .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; }
    .btn-primary { background: #1e88e5; color: #fff; }
    .btn-primary:hover { background: #1565c0; }
    .btn-success { background: #22c55e; color: #fff; }
    .btn-success:hover { background: #16a34a; }
    .btn-danger { background: #ef4444; color: #fff; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-box { max-width: 400px; margin: 100px auto; background: #0c1f3a; border: 1px solid #1a3a5a; border-radius: 12px; padding: 32px; }
    .login-box h2 { margin-bottom: 16px; color: #64b5f6; }
    .login-box input { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #1a3a5a; border-radius: 6px; background: #0b1a2e; color: #e8f2fa; font-size: 14px; }
    .login-box .btn { width: 100%; }
    .msg { margin-top: 8px; font-size: 13px; }
    .msg.success { color: #22c55e; }
    .msg.error { color: #ef4444; }
    .empty { text-align: center; padding: 40px; color: #64748b; }
    .key-display { font-family: monospace; font-size: 14px; letter-spacing: 1px; color: #22c55e; background: #0b1a2e; padding: 6px 12px; border-radius: 4px; display: inline-block; }
    .copy-btn { background: none; border: 1px solid #1a3a5a; color: #94a3b8; cursor: pointer; padding: 4px 8px; border-radius: 4px; font-size: 12px; margin-left: 4px; }
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
    .stat-card { background: #0c1f3a; border: 1px solid #1a3a5a; border-radius: 8px; padding: 16px; text-align: center; }
    .stat-card strong { display: block; font-size: 28px; margin-top: 4px; color: #64b5f6; }
    .stat-card span { font-size: 12px; color: #94a3b8; }
  </style>
</head>
<body>
<div class="container" id="loginScreen">
  <div class="login-box">
    <h2>Zestok Admin</h2>
    <input type="password" id="adminKeyInput" placeholder="Enter admin key" />
    <button class="btn btn-primary" id="adminLoginBtn">Login</button>
    <p class="msg" id="loginMsg"></p>
  </div>
</div>

<div class="container" id="adminPanel" style="display:none">
  <h1>Zestok Admin Panel</h1>

  <div class="stats-grid" id="statsGrid">
    <div class="stat-card"><span>Total Licenses</span><strong id="statLicenses">0</strong></div>
    <div class="stat-card"><span>Active Licenses</span><strong id="statActive">0</strong></div>
    <div class="stat-card"><span>Pending Payments</span><strong id="statPending">0</strong></div>
    <div class="stat-card"><span>Confirmed Payments</span><strong id="statConfirmed">0</strong></div>
  </div>

  <div class="tab-bar">
    <button class="active" data-tab="payments">Payments</button>
    <button data-tab="licenses">Licenses</button>
  </div>

  <div class="tab-content active" id="tabPayments">
    <div class="card">
      <h3>Pending Payments</h3>
      <table>
        <thead><tr><th>Date</th><th>Customer</th><th>Email</th><th>Product</th><th>Amount</th><th>Txn ID</th><th>Status</th><th>Action</th></tr></thead>
        <tbody id="paymentsBody"><tr><td colspan="8" class="empty">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>

  <div class="tab-content" id="tabLicenses">
    <div class="card">
      <h3>All Licenses</h3>
      <table>
        <thead><tr><th>Date</th><th>Key</th><th>Product</th><th>Customer</th><th>Email</th><th>Devices</th><th>Status</th></tr></thead>
        <tbody id="licensesBody"><tr><td colspan="7" class="empty">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const API = 'https://tender-solace-production-5226.up.railway.app';
let adminKey = localStorage.getItem('zestokAdminKey') || '';

async function api(path, body) {
  const headers = { 'Content-Type': 'application/json', 'x-admin-key': adminKey };
  const res = await fetch(API + path, { headers, ...(body ? { method: 'POST', body: JSON.stringify(body) } : {}) });
  if (res.status === 401) { localStorage.removeItem('zestokAdminKey'); adminKey = ''; document.getElementById('loginScreen').style.display = 'block'; document.getElementById('adminPanel').style.display = 'none'; throw new Error('Unauthorized'); }
  return res.json();
}

async function login() {
  const key = document.getElementById('adminKeyInput').value.trim();
  if (!key) { document.getElementById('loginMsg').textContent = 'Enter admin key'; return; }
  adminKey = key;
  try {
    const data = await api('/api/admin/payments');
    localStorage.setItem('zestokAdminKey', key);
    document.getElementById('loginMsg').textContent = '';
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    loadData();
  } catch (e) {
    document.getElementById('loginMsg').textContent = 'Invalid key or server error';
  }
}

async function loadData() {
  try {
    const [paymentsData, licensesData] = await Promise.all([
      api('/api/admin/payments'),
      api('/api/admin/licenses')
    ]);
    renderPayments(paymentsData.payments);
    renderLicenses(licensesData.licenses);
    renderStats(paymentsData.payments, licensesData.licenses);
  } catch (e) { console.error(e); }
}

function renderStats(payments, licenses) {
  document.getElementById('statLicenses').textContent = licenses.length;
  document.getElementById('statActive').textContent = licenses.filter(l => l.status === 'active').length;
  document.getElementById('statPending').textContent = payments.filter(p => p.status === 'pending').length;
  document.getElementById('statConfirmed').textContent = payments.filter(p => p.status === 'confirmed').length;
}

function renderPayments(payments) {
  const tbody = document.getElementById('paymentsBody');
  if (!payments.length) { tbody.innerHTML = '<tr><td colspan="8" class="empty">No payments yet</td></tr>'; return; }
  tbody.innerHTML = payments.map(p => `
    <tr>
      <td>${new Date(p.created_at).toLocaleDateString()}</td>
      <td>${p.customer_name}</td>
      <td>${p.customer_email}</td>
      <td>${p.product_type}</td>
      <td>$${p.amount}</td>
      <td style="font-size:11px;color:#94a3b8">${p.nayapay_txn_id}</td>
      <td><span class="badge ${p.status}">${p.status}</span></td>
      <td>${p.status === 'pending' ? `<button class="btn btn-success" onclick="confirmPayment('${p.id}')">Confirm & Deliver</button>` : '-'}</td>
    </tr>
  `).join('');
}

async function confirmPayment(paymentId) {
  if (!confirm('Confirm payment and generate license key?')) return;
  const btn = event.target; btn.disabled = true; btn.textContent = 'Processing...';
  try {
    const data = await api('/api/admin/confirm-payment', { paymentId });
    alert(`License generated!\nKey: ${data.license.key}\nProduct: ${data.license.productType}\nSent to: ${data.license.customerEmail}`);
    loadData();
  } catch (e) { alert('Error: ' + e.message); btn.disabled = false; btn.textContent = 'Confirm & Deliver'; }
}

function renderLicenses(licenses) {
  const tbody = document.getElementById('licensesBody');
  if (!licenses.length) { tbody.innerHTML = '<tr><td colspan="7" class="empty">No licenses yet</td></tr>'; return; }
  tbody.innerHTML = licenses.map(l => `
    <tr>
      <td>${new Date(l.created_at).toLocaleDateString()}</td>
      <td><span class="key-display">${l.license_key}</span> <button class="copy-btn" onclick="copyKey('${l.license_key}')">Copy</button></td>
      <td>${l.product_type}</td>
      <td>${l.customer_name}</td>
      <td>${l.customer_email}</td>
      <td>${l.activeDevices || 0}/${l.max_activations}</td>
      <td><span class="badge ${l.status}">${l.status}</span></td>
    </tr>
  `).join('');
}

function copyKey(key) { navigator.clipboard.writeText(key); event.target.textContent = 'Copied!'; setTimeout(() => event.target.textContent = 'Copy', 2000); }

document.getElementById('adminLoginBtn').addEventListener('click', login);
document.getElementById('adminKeyInput').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

document.querySelectorAll('.tab-bar button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab' + btn.dataset.tab.charAt(0).toUpperCase() + btn.dataset.tab.slice(1)).classList.add('active');
  });
});

if (adminKey) { document.getElementById('loginScreen').style.display = 'none'; document.getElementById('adminPanel').style.display = 'block'; loadData(); }
</script>
</body>
</html>
