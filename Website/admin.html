<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https://tender-solace-production-5226.up.railway.app; style-src 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
  <title>Zestok Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #060f1c;
      color: #e8f2fa;
      min-height: 100vh;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; top: -30%; right: -15%;
      width: 800px; height: 800px;
      background: radial-gradient(circle, rgba(30,136,229,0.08) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: ''; position: fixed; bottom: -25%; left: -10%;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(100,181,246,0.06) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    .container { max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }
    h1 { font-size: 24px; margin-bottom: 24px; color: #64b5f6; }
    .tab-bar { display: flex; gap: 8px; margin-bottom: 24px; }
    .tab-bar button {
      padding: 10px 20px; border: 1px solid #1a3a5a;
      background: rgba(12, 31, 58, 0.6);
      backdrop-filter: blur(8px);
      color: #94a3b8; border-radius: 8px; cursor: pointer;
      font-family: 'Inter', sans-serif; font-weight: 500;
      transition: all 0.3s;
    }
    .tab-bar button:hover {
      border-color: #64b5f6;
      transform: perspective(800px) translateZ(5px);
    }
    .tab-bar button.active { background: #1e88e5; color: #fff; border-color: #1e88e5; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .card {
      background: rgba(12, 31, 58, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(26, 58, 90, 0.5);
      border-radius: 12px; padding: 20px; margin-bottom: 16px;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      transform-style: preserve-3d;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(100,181,246,0.05), transparent);
      transition: left 0.6s;
    }
    .card:hover::before { left: 100%; }
    .card:hover {
      border-color: #64b5f6;
      transform: perspective(800px) rotateY(-2deg) rotateX(1deg) translateY(-3px) translateZ(8px);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4), 0 0 30px rgba(30,136,229,0.05);
    }
    .card h3 { color: #64b5f6; margin-bottom: 12px; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #1a3a5a; font-size: 13px; }
    th { color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; font-size: 11px; }
    tr { transition: background 0.2s; }
    tbody tr:hover { background: rgba(30, 136, 229, 0.04); }
    .badge { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
    .badge.pending { background: #f59e0b20; color: #f59e0b; border: 1px solid #f59e0b; }
    .badge.confirmed { background: #22c55e20; color: #22c55e; border: 1px solid #22c55e; }
    .badge.active { background: #22c55e20; color: #22c55e; border: 1px solid #22c55e; }
    .badge.inactive { background: #ef444420; color: #ef4444; border: 1px solid #ef4444; }
    .btn {
      padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer;
      font-size: 13px; font-weight: 500; font-family: 'Inter', sans-serif;
      transition: all 0.25s;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: #1e88e5; color: #fff; }
    .btn-primary:hover { background: #1565c0; box-shadow: 0 4px 16px rgba(30,136,229,0.3); }
    .btn-success { background: #22c55e; color: #fff; }
    .btn-success:hover { background: #16a34a; box-shadow: 0 4px 16px rgba(34,197,94,0.3); }
    .btn-danger { background: #ef4444; color: #fff; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-box {
      max-width: 420px; margin: 120px auto;
      background: rgba(12, 31, 58, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(26, 58, 90, 0.5);
      border-radius: 12px; padding: 36px 32px;
      transition: all 0.4s;
      transform-style: preserve-3d;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 40px rgba(30,136,229,0.04);
    }
    .login-box:hover {
      border-color: #64b5f6;
      transform: perspective(800px) rotateY(-2deg) translateY(-4px) translateZ(10px);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5), 0 0 50px rgba(30,136,229,0.08);
    }
    .login-box h2 { margin-bottom: 20px; color: #64b5f6; font-size: 22px; text-align: center; }
    .login-box input {
      width: 100%; padding: 12px 16px; margin-bottom: 14px;
      border: 1px solid #1a3a5a; border-radius: 8px;
      background: #060f1c; color: #e8f2fa; font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s;
    }
    .login-box input:focus {
      outline: none; border-color: #1e88e5;
      box-shadow: 0 0 0 3px rgba(30,136,229,0.15);
      transform: perspective(800px) translateZ(3px);
    }
    .login-box .btn { width: 100%; padding: 12px; font-size: 14px; }
    .msg { margin-top: 10px; font-size: 13px; text-align: center; font-weight: 500; }
    .msg.success { color: #22c55e; }
    .msg.error { color: #ef4444; }
    .empty { text-align: center; padding: 40px; color: #64748b; }
    .key-display { font-family: 'Courier New', monospace; font-size: 14px; letter-spacing: 1px; color: #22c55e; background: #060f1c; padding: 6px 12px; border-radius: 4px; display: inline-block; }
    .copy-btn { background: none; border: 1px solid #1a3a5a; color: #94a3b8; cursor: pointer; padding: 4px 8px; border-radius: 4px; font-size: 12px; margin-left: 4px; font-family: 'Inter', sans-serif; transition: all 0.2s; }
    .copy-btn:hover { border-color: #64b5f6; color: #64b5f6; transform: perspective(800px) translateZ(3px); }
    .stats-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px;
    }
    .stat-card {
      background: rgba(12, 31, 58, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(26, 58, 90, 0.5);
      border-radius: 12px; padding: 20px 16px; text-align: center;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      transform-style: preserve-3d;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(100,181,246,0.05), transparent);
      transition: left 0.6s;
    }
    .stat-card:hover::before { left: 100%; }
    .stat-card:hover {
      border-color: #64b5f6;
      transform: perspective(800px) rotateY(-2deg) rotateX(1deg) translateY(-4px) translateZ(8px);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4), 0 0 30px rgba(30,136,229,0.05);
    }
    .stat-card strong { display: block; font-size: 28px; margin-top: 6px; color: #64b5f6; font-weight: 800; }
    .stat-card span { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; }
    @media (max-width: 700px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      body { padding: 16px; }
      .login-box { margin: 80px auto; padding: 28px 24px; }
    }
  </style>
</head>
<body>
<div class="container" id="loginScreen">
  <div class="login-box">
    <h2>Zestok Admin</h2>
    <input type="password" id="adminKeyInput" placeholder="Enter admin key" />
    <button class="btn btn-primary" id="adminLoginBtn">Login</button>
    <p class="msg" id="loginMsg"></p>
  </div>
</div>

<div class="container" id="adminPanel" style="display:none">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
    <h1 style="margin:0">Zestok Admin Panel</h1>
    <button class="btn btn-danger" id="logoutBtn" style="width:auto">Logout</button>
  </div>

  <div class="stats-grid" id="statsGrid">
    <div class="stat-card"><span>Total Licenses</span><strong id="statLicenses">0</strong></div>
    <div class="stat-card"><span>Active Licenses</span><strong id="statActive">0</strong></div>
    <div class="stat-card"><span>Pending Payments</span><strong id="statPending">0</strong></div>
    <div class="stat-card"><span>Confirmed Payments</span><strong id="statConfirmed">0</strong></div>
  </div>

  <div class="tab-bar">
    <button class="active" data-tab="payments">Payments</button>
    <button data-tab="licenses">Licenses</button>
  </div>

  <div class="tab-content active" id="tabPayments">
    <div class="card">
      <h3>Pending Payments</h3>
      <table>
        <thead><tr><th>Date</th><th>Customer</th><th>Email</th><th>Product</th><th>Amount</th><th>Txn ID</th><th>Status</th><th>Action</th></tr></thead>
        <tbody id="paymentsBody"><tr><td colspan="8" class="empty">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>

  <div class="tab-content" id="tabLicenses">
    <div class="card">
      <h3>All Licenses</h3>
      <table>
        <thead><tr><th>Date</th><th>Key</th><th>Product</th><th>Customer</th><th>Email</th><th>Devices</th><th>Status</th></tr></thead>
        <tbody id="licensesBody"><tr><td colspan="7" class="empty">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const API = (function() {
  const stored = sessionStorage.getItem('zestokApiUrl');
  if (stored) return stored;
  return 'https://tender-solace-production-5226.up.railway.app';
})();

const SESSION_TIMEOUT = 30 * 60 * 1000;
let sessionTimer = null;
let loginAttempts = 0;
const MAX_LOGIN_ATTEMPTS = 5;
let lockoutUntil = 0;

let adminJWT = '';

function resetSessionTimer() {
  if (sessionTimer) clearTimeout(sessionTimer);
  sessionTimer = setTimeout(logout, SESSION_TIMEOUT);
}

function logout() {
  adminJWT = '';
  sessionStorage.removeItem('zestokAdminJWT');
  sessionStorage.removeItem('zestokApiUrl');
  if (sessionTimer) clearTimeout(sessionTimer);
  document.getElementById('loginScreen').style.display = 'block';
  document.getElementById('adminPanel').style.display = 'none';
  document.getElementById('adminKeyInput').value = '';
  document.getElementById('loginMsg').textContent = '';
}

async function api(path, body) {
  const headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + adminJWT };
  const res = await fetch(API + path, { headers, ...(body ? { method: 'POST', body: JSON.stringify(body) } : {}) });
  if (res.status === 401) {
    logout();
    throw new Error('Unauthorized');
  }
  if (res.status === 429) {
    throw new Error('Too many attempts. Try again later.');
  }
  return res.json();
}

async function login() {
  const now = Date.now();
  if (now < lockoutUntil) {
    const mins = Math.ceil((lockoutUntil - now) / 60000);
    document.getElementById('loginMsg').textContent = `Too many attempts. Try again in ${mins} min.`;
    return;
  }

  const key = document.getElementById('adminKeyInput').value.trim();
  if (!key) { document.getElementById('loginMsg').textContent = 'Enter admin key'; return; }

  try {
    const data = await fetch(API + '/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key })
    });
    if (data.status === 429) {
      const mins = Math.ceil(15);
      document.getElementById('loginMsg').textContent = `Too many attempts. Try again later.`;
      return;
    }
    if (data.status !== 200) {
      throw new Error('Invalid key');
    }
    const result = await data.json();
    adminJWT = result.token;
    loginAttempts = 0;
    sessionStorage.setItem('zestokAdminJWT', adminJWT);
    document.getElementById('loginMsg').textContent = '';
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    resetSessionTimer();
    loadData();
  } catch (e) {
    loginAttempts++;
    if (loginAttempts >= MAX_LOGIN_ATTEMPTS) {
      lockoutUntil = Date.now() + 15 * 60 * 1000;
      document.getElementById('loginMsg').textContent = 'Too many failed attempts. Locked for 15 min.';
      loginAttempts = 0;
    } else {
      document.getElementById('loginMsg').textContent = `Invalid key (${loginAttempts}/${MAX_LOGIN_ATTEMPTS})`;
    }
    adminJWT = '';
  }
}

async function loadData() {
  try {
    const [paymentsData, licensesData] = await Promise.all([
      api('/api/admin/payments'),
      api('/api/admin/licenses')
    ]);
    renderPayments(paymentsData.payments);
    renderLicenses(licensesData.licenses);
    renderStats(paymentsData.payments, licensesData.licenses);
    resetSessionTimer();
  } catch (e) { console.error(e); }
}

function renderStats(payments, licenses) {
  document.getElementById('statLicenses').textContent = licenses.length;
  document.getElementById('statActive').textContent = licenses.filter(l => l.status === 'active').length;
  document.getElementById('statPending').textContent = payments.filter(p => p.status === 'pending').length;
  document.getElementById('statConfirmed').textContent = payments.filter(p => p.status === 'confirmed').length;
}

function renderPayments(payments) {
  const tbody = document.getElementById('paymentsBody');
  if (!payments.length) { tbody.innerHTML = '<tr><td colspan="8" class="empty">No payments yet</td></tr>'; return; }
  tbody.innerHTML = payments.map(p => `
    <tr>
      <td>${new Date(p.created_at).toLocaleDateString()}</td>
      <td>${escHtml(p.customer_name)}</td>
      <td>${escHtml(p.customer_email)}</td>
      <td>${escHtml(p.product_type)}</td>
      <td>$${p.amount}</td>
      <td style="font-size:11px;color:#94a3b8">${escHtml(p.nayapay_txn_id)}</td>
      <td><span class="badge ${p.status}">${p.status}</span></td>
      <td>${p.status === 'pending' ? `<button class="btn btn-success" onclick="confirmPayment('${p.id}')">Confirm & Deliver</button>` : '-'}</td>
    </tr>
  `).join('');
}

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

async function confirmPayment(paymentId) {
  if (!confirm('Confirm payment and generate license key?')) return;
  const btn = event.target; btn.disabled = true; btn.textContent = 'Processing...';
  try {
    const data = await api('/api/admin/confirm-payment', { paymentId });
    alert(`License generated!\nKey: ${data.license.key}\nProduct: ${data.license.productType}\nSent to: ${data.license.customerEmail}`);
    loadData();
  } catch (e) { alert('Error: ' + e.message); btn.disabled = false; btn.textContent = 'Confirm & Deliver'; }
}

function renderLicenses(licenses) {
  const tbody = document.getElementById('licensesBody');
  if (!licenses.length) { tbody.innerHTML = '<tr><td colspan="7" class="empty">No licenses yet</td></tr>'; return; }
  tbody.innerHTML = licenses.map(l => `
    <tr>
      <td>${new Date(l.created_at).toLocaleDateString()}</td>
      <td><span class="key-display">${escHtml(l.license_key)}</span> <button class="copy-btn" onclick="copyKey('${escHtml(l.license_key)}')">Copy</button></td>
      <td>${escHtml(l.product_type)}</td>
      <td>${escHtml(l.customer_name)}</td>
      <td>${escHtml(l.customer_email)}</td>
      <td>${l.activeDevices || 0}/${l.max_activations}</td>
      <td><span class="badge ${l.status}">${l.status}</span></td>
    </tr>
  `).join('');
}

function copyKey(key) { navigator.clipboard.writeText(key); event.target.textContent = 'Copied!'; setTimeout(() => event.target.textContent = 'Copy', 2000); }

document.getElementById('adminLoginBtn').addEventListener('click', login);
document.getElementById('adminKeyInput').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
document.getElementById('logoutBtn').addEventListener('click', logout);

document.addEventListener('click', resetSessionTimer);
document.addEventListener('keydown', resetSessionTimer);
document.addEventListener('mousemove', resetSessionTimer);

document.querySelectorAll('.tab-bar button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab' + btn.dataset.tab.charAt(0).toUpperCase() + btn.dataset.tab.slice(1)).classList.add('active');
    resetSessionTimer();
  });
});

const savedJWT = sessionStorage.getItem('zestokAdminJWT');
if (savedJWT) {
  adminJWT = savedJWT;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminPanel').style.display = 'block';
  resetSessionTimer();
  loadData();
}
</script>
</body>
</html>
