<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Setup - Stock Management</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #07172e; color: #e2e8f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
      .card { background: #0f2a44; border-radius: 12px; padding: 36px; width: 460px; box-shadow: 0 8px 32px rgba(0,0,0,.4); }
      h1 { font-size: 20px; margin-bottom: 4px; }
      .sub { color: #94a3b8; font-size: 13px; margin-bottom: 20px; line-height: 1.5; }
      .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
      .field span { font-size: 13px; color: #94a3b8; }
      .field input { padding: 10px 12px; border-radius: 6px; border: 1px solid #1e3a5f; background: #0b1e33; color: #e2e8f0; font-size: 14px; outline: none; }
      .field input:focus { border-color: #3b82f6; }
      .field input::placeholder { color: #475569; }
      .primary-btn { width: 100%; padding: 12px; border-radius: 6px; border: none; background: #3b82f6; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; }
      .primary-btn:hover { background: #2563eb; }
      .primary-btn:disabled { opacity: .5; cursor: not-allowed; }
      .msg { margin-top: 12px; font-size: 13px; text-align: center; min-height: 20px; }
      .msg.success { color: #22c55e; }
      .msg.error { color: #ef4444; }
      .msg.info { color: #f59e0b; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Cloud Setup</h1>
      <p class="sub">Connect to your Stock Management server and create your PIN.</p>
      <div class="field">
        <span>Server URL</span>
        <input id="serverUrl" type="url" placeholder="https://api.mystock.com" />
      </div>
      <div class="field">
        <span>Company Name</span>
        <input id="companyName" type="text" placeholder="e.g. Usama Fabrics" maxlength="100" />
      </div>
      <button class="primary-btn" id="connectBtn">Connect</button>
      <p class="msg" id="msg"></p>
    </div>
    <script>
      document.getElementById("connectBtn").addEventListener("click", async () => {
        const serverUrl = document.getElementById("serverUrl").value.trim();
        const companyName = document.getElementById("companyName").value.trim();
        const msg = document.getElementById("msg");
        const btn = document.getElementById("connectBtn");

        if (!serverUrl) { msg.textContent = "Server URL is required"; msg.className = "msg error"; return; }
        btn.disabled = true;
        msg.textContent = "Connecting...";
        msg.className = "msg info";

        try {
          const res = await fetch(serverUrl.replace(/\/+$/, '') + "/api/health");
          if (!res.ok) throw new Error("Server not reachable");
          msg.textContent = "Connected! Setup complete.";
          msg.className = "msg success";
          localStorage.setItem("stockApiUrl", serverUrl.replace(/\/+$/, ''));
          if (companyName) localStorage.setItem("stockCompanyName", companyName);
          setTimeout(() => {
            window.location.href = "index.html";
          }, 1000);
        } catch (e) {
          msg.textContent = "Could not connect to server. Check the URL and try again.";
          msg.className = "msg error";
          btn.disabled = false;
        }
      });
      document.getElementById("serverUrl").addEventListener("keydown", (e) => {
        if (e.key === "Enter") document.getElementById("connectBtn").click();
      });
    </script>
  </body>
</html>
